<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main class="app">
      <section class="card">
        <h1>QR Code Generator</h1>
        <p>Enter a link or text to generate your QR code.</p>

        <form>
          <label class="field">
            <span>Content</span>
            <input
              type="text"
              id="input-content"
              placeholder="https://example.com"
            />
          </label>

          <label class="field">
            <span>Size</span>
            <select id="input-size">
              <option>100 × 100</option>
              <option selected>200 × 200</option>
              <option>300 × 300</option>
            </select>
          </label>

          <button type="button" id="create-qr-code">Create QR Code</button>
        </form>
      </section>

      <aside class="preview" aria-label="QR code preview">
        <div id="qr-code">your QR code will appear here</div>
      </aside>
    </main>

    <footer class="footer">
      <p>&copy; 2026 QR Code Generator . Built by FredZonTech . Version 1.0</p>
    </footer>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
      integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="index.js"></script>
  </body>
</html>
